<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>Vioast - Open Day Assistant</title>

    <link rel="icon" href="/app-logo.png">
    <link rel="apple-touch-icon" href="/app-logo.png">
    <link rel="manifest" href="/manifest.json">

    <link rel="apple-touch-startup-image" href="/app-logo.png" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)">

    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #131314; }
        iframe { width: 100%; height: 100%; border: none; display: block; }

   
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #131314; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.5s ease-out, visibility 0.5s;
        }
        
        .splash-logo {
            width: 96px; height: 96px;
            margin-bottom: 24px;
            animation: pulse 2s infinite ease-in-out;
        }

        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; filter: drop-shadow(0 0 8px rgba(138,180,248,0.2)); }
            50% { transform: scale(1.05); opacity: 1; filter: drop-shadow(0 0 20px rgba(138,180,248,0.6)); }
        }

        #splash-screen.fade-out { opacity: 0; visibility: hidden; }

      
        .pwa-download-btn {
            background: #8ab4f8;
            color: #131314;
            border: none;
            padding: 10px 24px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(138, 180, 248, 0.3);
            transition: transform 0.2s, opacity 0.3s;
            opacity: 0; 
            pointer-events: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .pwa-download-btn.show {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(10px);
        }
        .pwa-download-btn:active {
            transform: scale(0.96) translateY(10px);
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="/app-logo.png" alt="Logo" class="splash-logo">
        <button id="btn-pwa-download" class="pwa-download-btn">📥 安裝桌面 App</button>
    </div>

    <iframe id="app-iframe" src="https://hiruynk-ive-open-day-chat-bot.hf.space" allow="microphone; display-capture" onload="hideSplash()"></iframe>

    <script>
        
        function hideSplash() {
            const splash = document.getElementById('splash-screen');
           
            setTimeout(() => {
                splash.classList.add('fade-out');
            }, 500);
        }

        
        setTimeout(() => {
            const splash = document.getElementById('splash-screen');
            if (!splash.classList.contains('fade-out')) {
                splash.classList.add('fade-out');
            }
        }, 8000);

       
        let deferredPrompt;
        const downloadBtn = document.getElementById('btn-pwa-download');

        
        window.addEventListener('beforeinstallprompt', (e) => {
            
            e.preventDefault();
            
            deferredPrompt = e;
            
            downloadBtn.classList.add('show');
        });

     
        downloadBtn.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            
           
            deferredPrompt.prompt();
            
            
            const { outcome } = await deferredPrompt.userChoice;
            console.log(`User installation choice: ${outcome}`);
            
           
            deferredPrompt = null;
            downloadBtn.classList.remove('show');
        });

       
        window.addEventListener('appinstalled', () => {
            console.log('🎉 Vioast App 安裝成功！');
            downloadBtn.classList.remove('show');
        });
    </script>
</body>
</html>
